name: Mirror to Hjerterom

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/mirror-to-hjerterom.yml

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Boly
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MIRROR_TOKEN }}

      - name: Mirror branches and tags to Hjerterom
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="$(printf '%s' "$MIRROR_TOKEN" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$TOKEN" ]; then
            echo "MIRROR_TOKEN is missing on OskarHUKIT/Boly."
            exit 1
          fi

          HTTP_CODE="$(curl -sS -o /tmp/repo-check.json -w '%{http_code}' \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/OskarHUKIT/Hjerterom)"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Token cannot read OskarHUKIT/Hjerterom (HTTP ${HTTP_CODE})."
            cat /tmp/repo-check.json || true
            exit 1
          fi

          PERM="$(python3 - <<'PY'
          import json
          data = json.load(open("/tmp/repo-check.json"))
          print(data.get("permissions", {}).get("push", False))
          PY
          )"

          if [ "$PERM" != "True" ]; then
            echo "Token can read Hjerterom but does not have push permission."
            echo "Create a classic PAT with the full 'repo' scope."
            exit 1
          fi

          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global credential.helper ""

          DEST="https://x-access-token:${TOKEN}@github.com/OskarHUKIT/Hjerterom.git"

          if git cat-file -e "main:.github/workflows/mirror-to-hjerterom.yml" 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git branch hjerterom-main main
            git checkout hjerterom-main
            git rm -f .github/workflows/mirror-to-hjerterom.yml
            git commit -m "Remove Boly mirror workflow from Hjerterom"
            git push "$DEST" hjerterom-main:main
          else
            git push "$DEST" main:main
          fi

          for branch in $(git for-each-ref --format='%(refname:short)' refs/heads/ | grep -v '^hjerterom-main$' | grep -v '^main$'); do
            git push "$DEST" "${branch}:${branch}"
          done

          git push "$DEST" --tags
