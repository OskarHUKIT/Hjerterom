name: Mirror to Hjerterom

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Boly
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror branches and tags to Hjerterom
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          if [ -z "$MIRROR_TOKEN" ]; then
            echo "Missing MIRROR_TOKEN secret. Add a PAT with repo access under Settings → Secrets → Actions."
            exit 1
          fi
          git remote add hjerterom "https://x-access-token:${MIRROR_TOKEN}@github.com/OskarHUKIT/Hjerterom.git"
          git push hjerterom --all
          git push hjerterom --tags
