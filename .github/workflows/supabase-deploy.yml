name: Supabase DB Push

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Skriv push for å bekrefte migrasjon til produksjon'
        required: true
        type: string
      database_mode:
        description: 'existing_boly = schema finnes (typisk); fresh = helt ny database'
        required: true
        type: choice
        default: existing_boly
        options:
          - existing_boly
          - fresh
  push:
    branches: [main]
    paths:
      - '.github/trigger-supabase-db-push'

jobs:
  db-push:
    if: github.event_name == 'push' || github.event.inputs.confirm == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        working-directory: supabase
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Apply Hjerterum migrations only (existing Boly)
        if: github.event_name == 'push' || github.event.inputs.database_mode == 'existing_boly'
        working-directory: supabase
        run: |
          set -euo pipefail
          HJERTERUM=(
            migrations/20260630120000_hjerterum_lanes_and_central_events.sql
            migrations/20260630180000_hjerterum_complete_phase3_5.sql
            migrations/20260630200000_hjerterum_production_ready.sql
            migrations/20260630210000_platform_control_panel.sql
          )
          for f in "${HJERTERUM[@]}"; do
            echo "Applying $f ..."
            supabase db query --linked -f "$f"
            version="$(basename "$f" .sql)"
            version="${version%%_*}"
            supabase migration repair "$version" --status applied
          done

      - name: Push all migrations (fresh database)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.database_mode == 'fresh'
        working-directory: supabase
        run: supabase db push --yes
