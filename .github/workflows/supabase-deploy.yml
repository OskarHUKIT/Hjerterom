name: Supabase DB Push

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Skriv push for å bekrefte migrasjon til produksjon'
        required: true
        type: string
      database_mode:
        description: 'existing_boly = schema finnes (typisk); fresh = helt ny database'
        required: true
        type: choice
        default: existing_boly
        options:
          - existing_boly
          - fresh
  push:
    branches: [main]
    paths:
      - '.github/trigger-supabase-db-push'

jobs:
  db-push:
    if: github.event_name == 'push' || github.event.inputs.confirm == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        working-directory: supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Mark pre-Hjerterum migrations applied (existing Boly)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.database_mode == 'existing_boly'
        working-directory: supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          for f in migrations/*.sql; do
            base="$(basename "$f" .sql)"
            ts="${base%%_*}"
            if [[ "$ts" -lt "20260630120000" ]]; then
              echo "Repair (applied): $base"
              supabase migration repair "$base" --status applied || true
            fi
          done

      - name: Push migrations
        working-directory: supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --yes
